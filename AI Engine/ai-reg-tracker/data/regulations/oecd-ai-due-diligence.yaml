summary: Applies responsible-business-conduct due diligence to AI across the value chain via a six-step
  cycle (embed, identify/assess, prevent/mitigate, track, communicate, remediate). Adds a human-rights/adverse-impact
  lens plus stakeholder engagement and remediation, board oversight, and public disclosure of significant
  adverse impacts. Voluntary but travels into procurement and audit.
